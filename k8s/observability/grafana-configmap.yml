apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: default
data:
  GF_USERS_DEFAULT_THEME: "light"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-config
  namespace: default
data:
  prometheus.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: Microsservicos do Hotel
        orgId: 1
        folder: Microsservicos do Hotel
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
