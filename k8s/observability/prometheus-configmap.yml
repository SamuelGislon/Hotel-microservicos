apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: hosped-gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - hosped-gateway-service:8080

      - job_name: reserva-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - reserva-service-service:8081

      - job_name: hosped-quarto
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - hosped-quarto-service:8084

      - job_name: hosped-users
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - hosped-users-service:8085

      - job_name: hosped-pagamento
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - hosped-pagamento-service:8083
