apiVersion: v1
kind: ConfigMap
metadata:
  name: reserva-service-config
  namespace: default
data:
  SERVER_PORT: "8081"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "reserva_db"
  DB_USER: "reserva_user"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: "guest"
  APP_ENVIRONMENT: "LOCAL"
  APP_INTEGRACAO_QUARTO_STRATEGY: "http"
  APP_INTEGRACAO_QUARTO_BASE_URL: "http://hosped-quarto-service:8084"
  APP_INTEGRACAO_QUARTO_PERMITIR_STANDALONE: "false"
  APP_INTEGRACAO_PAGAMENTO_STRATEGY: "http"
  APP_INTEGRACAO_PAGAMENTO_BASE_URL: "http://hosped-pagamento-service:8083"
  SPRING_PROFILES_ACTIVE: "docker"