apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hosped-quarto-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: quarto.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hosped-quarto-service
                port:
                  number: 8084