apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: default
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
      CREATE DATABASE hosped_pagamentos;
      CREATE USER pagamentos_user WITH PASSWORD 'pagamentos_pass';
      GRANT ALL PRIVILEGES ON DATABASE hosped_pagamentos TO pagamentos_user;

      CREATE DATABASE hosped_quartos;
      CREATE USER quartos_user WITH PASSWORD 'quartos_pass';
      GRANT ALL PRIVILEGES ON DATABASE hosped_quartos TO quartos_user;

      CREATE DATABASE hosped_users;
      CREATE USER users_user WITH PASSWORD 'users_pass';
      GRANT ALL PRIVILEGES ON DATABASE hosped_users TO users_user;

      CREATE DATABASE reserva_db;
      CREATE USER reserva_user WITH PASSWORD 'reserva_pass';
      GRANT ALL PRIVILEGES ON DATABASE reserva_db TO reserva_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="hosped_pagamentos" <<-EOSQL
      GRANT ALL ON SCHEMA public TO pagamentos_user;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO pagamentos_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="hosped_quartos" <<-EOSQL
      GRANT ALL ON SCHEMA public TO quartos_user;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO quartos_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="hosped_users" <<-EOSQL
      GRANT ALL ON SCHEMA public TO users_user;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO users_user;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="reserva_db" <<-EOSQL
      GRANT ALL ON SCHEMA public TO reserva_user;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO reserva_user;
    EOSQL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: init-script
          configMap:
            name: postgres-init-config
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP