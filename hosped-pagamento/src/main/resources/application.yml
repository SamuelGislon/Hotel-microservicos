server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:ms-pagamentos}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hosped_pagamentos}
    username: ${SPRING_DATASOURCE_USERNAME:pagamentos_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pagamentos_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          auth-login-disable: true
        debug: ${MAIL_DEBUG:false}

pagamento:
  expiracao:
    horas: ${PAGAMENTO_EXPIRACAO_HORAS:8}
    verificacao-ms: ${PAGAMENTO_EXPIRACAO_VERIFICACAO_MS:60000}
  email:
    enabled: ${PAGAMENTO_EMAIL_ENABLED:false}
  confirmation-base-url: ${PAYMENT_CONFIRMATION_BASE_URL:http://localhost:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
