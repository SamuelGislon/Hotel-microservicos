global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: hosped-reserva-homol
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hosped-reserva-homol.onrender.com

  - job_name: hosped-quarto-homol
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hosped-quarto-homol.onrender.com

  - job_name: hosped-pagamento-homol
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hotel-microservicos.onrender.com