global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: hosped-gateway-dev
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hosped-gateway-dev.onrender.com

  - job_name: reserva-service-dev
    scheme: https
    metrics_path: /actuator/prometheus
