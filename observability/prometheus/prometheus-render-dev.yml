          - reserva-service-dev.onrender.com

  - job_name: hosped-quarto-dev
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hosped-quarto-dev.onrender.com

  - job_name: hosped-users-dev
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hosped-users-dev.onrender.com

  - job_name: hosped-pagamento-dev
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hosped-pagamento-dev.onrender.com
