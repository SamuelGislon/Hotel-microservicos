name: CI/CD Java reutilizavel

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      docker_image:
        required: true
        type: string
      dockerhub_namespace:
        required: false
        type: string
        default: ""
      sonar_project_key:
        required: false
        type: string
        default: ""
      sonar_organization:
        required: false
        type: string
        default: ""
      sonar_host_url:
        required: false
        type: string
        default: "https://sonarcloud.io"
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      RENDER_DEPLOY_HOOK_DEV:
        required: false
      RENDER_DEPLOY_HOOK_HOMOL:
        required: false

permissions:
  contents: read

jobs:
  ci-cd:
    name: Build, testes, imagem e deploy
    runs-on: ubuntu-latest
    environment: secrets_hotel_microservicos
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ inputs.sonar_project_key }}
      SONAR_ORGANIZATION: ${{ inputs.sonar_organization }}
      SONAR_HOST_URL: ${{ inputs.sonar_host_url }}
      RENDER_DEPLOY_HOOK_DEV: ${{ secrets.RENDER_DEPLOY_HOOK_DEV }}
      RENDER_DEPLOY_HOOK_HOMOL: ${{ secrets.RENDER_DEPLOY_HOOK_HOMOL }}

    steps:
      - name: Baixar codigo-fonte
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build e testes - ${{ inputs.service_name }}
        working-directory: ${{ inputs.service_path }}
        shell: bash
        run: |
          set -euo pipefail
          mvn -B clean verify

      - name: Analisar com SonarCloud
        working-directory: ${{ inputs.service_path }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "branch" ] || [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::notice title=Analise SonarCloud ignorada::A analise SonarCloud roda apenas na branch main. A branch ${GITHUB_REF_NAME} mantem build, testes, imagem Docker e deploy sem publicar analise."
            exit 0
          fi

          missing=()
          if [ -z "${SONAR_TOKEN}" ]; then
            missing+=("secret SONAR_TOKEN")
          fi
          if [ -z "${SONAR_PROJECT_KEY}" ]; then
            missing+=("variavel SONAR_PROJECT_KEY para ${{ inputs.service_name }}")
          fi

          sonar_host_url="${SONAR_HOST_URL:-https://sonarcloud.io}"
          if [[ "${sonar_host_url}" == *"sonarcloud.io"* ]] && [ -z "${SONAR_ORGANIZATION}" ]; then
            missing+=("variavel SONAR_ORGANIZATION")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf -v missing_list '%s, ' "${missing[@]}"
            missing_list="${missing_list%, }"
            echo "::warning title=Analise SonarCloud ignorada::Faltando ${missing_list}. Configure os secrets/variables do GitHub Actions para habilitar a analise de ${{ inputs.service_name }}."
            exit 0
          fi

          sonar_args=(
            "-Dsonar.projectKey=${SONAR_PROJECT_KEY}"
            "-Dsonar.projectName=${{ inputs.service_name }}"
            "-Dsonar.host.url=${sonar_host_url}"
            "-Dsonar.scanner.skipJreProvisioning=true"
          )
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            sonar_args+=("-Dsonar.organization=${SONAR_ORGANIZATION}")
          fi

          sonar_command=(
            mvn -B
            org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
            "${sonar_args[@]}"
          )

          for attempt in 1 2 3; do
            echo "Executando analise SonarCloud de ${{ inputs.service_name }} (tentativa ${attempt}/3)."
            if "${sonar_command[@]}"; then
              exit 0
            fi

            status=$?
            if [ "${attempt}" -eq 3 ]; then
              echo "::error title=Analise SonarCloud falhou::A analise SonarCloud falhou apos 3 tentativas. Confira as permissoes de SONAR_TOKEN e o SONAR_PROJECT_KEY de ${{ inputs.service_name }}."
              exit "${status}"
            fi

            sleep_seconds=$((attempt * 30))
            echo "::warning title=Nova tentativa SonarCloud::A analise SonarCloud falhou com codigo ${status}. Nova tentativa em ${sleep_seconds}s para contornar oscilacoes da API."
            sleep "${sleep_seconds}"
          done

      - name: Validar credenciais do Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME}" ] || [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Configure DOCKERHUB_USERNAME e DOCKERHUB_TOKEN como secrets do GitHub Actions para publicar imagens Docker."
            exit 1
          fi

      - name: Preparar metadados da imagem Docker
        id: image
        shell: bash
        env:
          DOCKERHUB_NAMESPACE_INPUT: ${{ inputs.dockerhub_namespace }}
          SERVICE_IMAGE: ${{ inputs.docker_image }}
        run: |
          set -euo pipefail
          namespace="${DOCKERHUB_NAMESPACE_INPUT:-${DOCKERHUB_USERNAME:-local}}"
          image="docker.io/${namespace}/${SERVICE_IMAGE}"
          short_sha="${GITHUB_SHA::12}"
          version="1.0.0"
          if [ -f VERSION ]; then
            version="$(tr -d '[:space:]' < VERSION)"
          fi

          push_enabled="false"
          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            push_enabled="true"
          fi

          deploy_image=""
          tags=("${image}:sha-${short_sha}")
          if [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            case "${GITHUB_REF_NAME}" in
              develop)
                tags+=("${image}:dev-${GITHUB_SHA}")
                deploy_image="${image}:dev-${GITHUB_SHA}"
                ;;
              main)
                tags+=("${image}:homol-${GITHUB_SHA}")
                deploy_image="${image}:homol-${GITHUB_SHA}"
                ;;
              feature/*)
                safe_branch="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9_.-]+#-#g')"
                tags+=("${image}:${safe_branch}-${short_sha}")
                ;;
            esac
          elif [ "${GITHUB_REF_TYPE}" = "tag" ] && [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=("${image}:${GITHUB_REF_NAME}" "${image}:latest")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "image=${image}"
            echo "deploy_image=${deploy_image}"
            echo "version=${version}"
            echo "push_enabled=${push_enabled}"
          } >> "${GITHUB_OUTPUT}"

      - name: Definir data do build
        id: build_date
        shell: bash
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Autenticar no Docker Hub
        if: ${{ steps.image.outputs.push_enabled == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build da imagem Docker
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.service_path }}
          push: ${{ steps.image.outputs.push_enabled == 'true' }}
          tags: ${{ steps.image.outputs.tags }}
          build-args: |
            BUILD_DATE=${{ steps.build_date.outputs.value }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.image.outputs.version }}

      - name: Deploy no Render
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          DEPLOY_IMAGE: ${{ steps.image.outputs.deploy_image }}
          PUSH_ENABLED: ${{ steps.image.outputs.push_enabled }}
        run: |
          set -euo pipefail
          hook=""
          case "${GITHUB_REF_NAME}" in
            develop)
              hook="${RENDER_DEPLOY_HOOK_DEV}"
              ;;
            main)
              hook="${RENDER_DEPLOY_HOOK_HOMOL}"
              ;;
            *)
              echo "Nao ha deploy Render para ${GITHUB_REF_NAME}."
              exit 0
              ;;
          esac

          if [ "${PUSH_ENABLED}" != "true" ]; then
            echo "Credenciais do Docker Hub nao configuradas; deploy Render ignorado."
            exit 0
          fi

          if [ -z "${hook}" ]; then
            echo "Deploy hook do Render nao configurado para ${GITHUB_REF_NAME}; deploy ignorado."
            exit 0
          fi

          if [ -z "${DEPLOY_IMAGE}" ]; then
            echo "Nenhuma imagem de deploy foi gerada para ${GITHUB_REF_NAME}; deploy ignorado."
            exit 0
          fi

          separator="?"
          if [[ "${hook}" == *"?"* ]]; then
            separator="&"
          fi

          encoded_image="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "${DEPLOY_IMAGE}")"
          curl --fail-with-body -sS -X POST "${hook}${separator}imgURL=${encoded_image}"
